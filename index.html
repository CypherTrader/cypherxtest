<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CypherX - Sua Plataforma Cósmica de Trades</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@^4.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@^3.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@^1.1.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@^0.2.0/dist/chartjs-chart-financial.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@^3.0.0"></script>
    <!-- SUPABASE CLIENT -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ... Seus estilos existentes permanecem aqui, sem alterações ... */
    </style>
</head>
<body>
    <!-- ... TODO O SEU CONTEÚDO EXISTENTE ... -->

    <!-- Bloco de Autenticação Supabase (discreto, pode ser removido/ocultado se não quiser exibir na tela) -->
    <div id="auth-area" style="max-width:400px;margin:40px auto;display:none;">
      <form id="login-form" style="margin-bottom:18px;">
        <label for="login-email">E-mail</label>
        <input type="email" id="login-email" required>
        <label for="login-password">Senha</label>
        <input type="password" id="login-password" required>
        <button type="submit">Entrar</button>
        <p id="login-error" style="color:var(--destructive-color);font-size:0.95em;"></p>
      </form>
      <form id="register-form">
        <label for="register-email">E-mail</label>
        <input type="email" id="register-email" required>
        <label for="register-password">Senha</label>
        <input type="password" id="register-password" required>
        <button type="submit">Cadastrar</button>
        <p id="register-error" style="color:var(--destructive-color);font-size:0.95em;"></p>
      </form>
      <button id="logout-btn" style="display:none;margin-top:18px;">Sair</button>
      <div id="welcome-message" style="display:none;margin-top:16px;color:var(--win-color);font-weight:bold;"></div>
    </div>

    <!-- Script de Autenticação Supabase -->
    <script>
      // Configuração do seu projeto Supabase
      const SUPABASE_URL = 'https://crfrjpetkblwvhwordnr.supabase.co';
      const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNyZnJqcGV0a2Jsd3Zod29yZG5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg2MjE5NDAsImV4cCI6MjA2NDE5Nzk0MH0.BYp7py3Phpprg57JUkd6gRYA4WtYyyo2KF8ExEdx65E';

      const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      // Função para atualizar interface
      async function updateAuthUI() {
        const { data: { session } } = await supabase.auth.getSession();
        const authArea = document.getElementById('auth-area');
        if (!authArea) return;
        if (session) {
          document.getElementById('login-form').style.display = 'none';
          document.getElementById('register-form').style.display = 'none';
          document.getElementById('logout-btn').style.display = 'block';
          document.getElementById('welcome-message').style.display = 'block';
          document.getElementById('welcome-message').textContent = 'Bem-vindo, ' + (session.user.email || 'usuário') + '!';
        } else {
          document.getElementById('login-form').style.display = 'block';
          document.getElementById('register-form').style.display = 'block';
          document.getElementById('logout-btn').style.display = 'none';
          document.getElementById('welcome-message').style.display = 'none';
        }
        // Exibe o bloco de autenticação (remova se for modal ou overlay)
        authArea.style.display = 'block';
      }

      // Eventos de formulário
      document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        document.getElementById('login-error').textContent = error ? error.message : '';
        updateAuthUI();
      });

      document.getElementById('register-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('register-email').value;
        const password = document.getElementById('register-password').value;
        const { error } = await supabase.auth.signUp({ email, password });
        document.getElementById('register-error').textContent = error ? error.message : '';
        if (!error) alert('Cadastro realizado! Verifique seu e-mail para confirmar.');
        updateAuthUI();
      });

      document.getElementById('logout-btn').addEventListener('click', async function() {
        await supabase.auth.signOut();
        updateAuthUI();
      });

      // Atualiza UI ao carregar
      updateAuthUI();
      // Atualiza UI ao mudar sessão (login/logout em outras abas)
      supabase.auth.onAuthStateChange((_event, _session) => {
        updateAuthUI();
      });
    </script>
</body>
</html>
